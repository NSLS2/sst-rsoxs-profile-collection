[configuration]
has_slits = true
has_motorized_samples = true
has_motorized_eref = false

[settings]
startup_modules = ['rsoxs.startup']
plan_decorators = ["rsoxs_waxs"]
# suspenders = ["rsoxs-suspenders"]

[settings.plans]
xas = ['regions.toml']
rsoxs = ['regions.toml']

[settings.redis.md]
host = "info.sst.nsls2.bnl.gov"
prefix = "rsoxs-"

[settings.redis.config]
host = "info.sst.nsls2.bnl.gov"
prefix = "rsoxs-"
# port = 60737
db = 1

[settings.redis.info]
host = "info.sst.nsls2.bnl.gov"
prefix = "rsoxs-"
# port = 60737
db = 2

[settings.logging]
enabled = true
method = "nslsii"

[settings.tiled_writer]
profile = "nsls2"
catalog_path = ["rsoxs", "raw"]
api_key_env = "TILED_BLUESKY_WRITING_API_KEY_RSOXS"
subscribe_method = "post_document"

[settings.kafka]
name = "rsoxs"